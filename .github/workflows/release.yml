name: Release

on:
  push:
    tags: ["v*"]

defaults:
  run:
    shell: bash

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: "0"
        run: make build

      - name: Test
        run: make test

      - name: Vet
        run: make vet

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        id: package
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          BIN="gm"
          if [ "$GOOS" = "windows" ]; then
            BIN="gm.exe"
          fi

          mkdir -p dist

          go build -ldflags="-s -w -X main.version=${TAG}" -o "${BIN}" ./cmd/gm

          if [ "$GOOS" = "windows" ]; then
            ARCHIVE="dist/gm-${TAG}-${GOOS}-${GOARCH}.zip"
            zip -q "${ARCHIVE}" "${BIN}"
          else
            ARCHIVE="dist/gm-${TAG}-${GOOS}-${GOARCH}.tar.gz"
            tar czf "${ARCHIVE}" "${BIN}"
          fi

          echo "artifact=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gm-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.package.outputs.artifact }}
          if-no-files-found: error
          compression-level: 0

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gm-*
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*

      - name: Verify release asset digests
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          artifacts=(dist/*)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "no release artifacts were downloaded"
            exit 1
          fi

          for attempt in $(seq 1 10); do
            if ! release_json="$(gh api "repos/${REPOSITORY}/releases/tags/${TAG}" 2>/dev/null)"; then
              if [ "${attempt}" -lt 10 ]; then
                echo "release metadata not ready yet; retrying (${attempt}/10)"
                sleep 3
                continue
              fi
              echo "release metadata is still unavailable for ${TAG}"
              exit 1
            fi

            missing=0
            mismatch=0

            for artifact in dist/*; do
              name="$(basename "${artifact}")"
              expected="sha256:$(sha256sum "${artifact}" | awk '{print $1}')"
              actual="$(printf '%s' "${release_json}" | jq -r --arg name "${name}" '.assets[] | select(.name == $name) | .digest // empty')"

              if [ -z "${actual}" ]; then
                echo "asset ${name} is missing digest metadata"
                missing=1
                continue
              fi

              if [ "${actual}" != "${expected}" ]; then
                echo "asset ${name} digest mismatch: expected ${expected}, got ${actual}"
                mismatch=1
              fi
            done

            if [ "${missing}" -eq 0 ] && [ "${mismatch}" -eq 0 ]; then
              echo "release asset digests verified"
              exit 0
            fi

            if [ "${attempt}" -lt 10 ]; then
              echo "release metadata not ready yet; retrying (${attempt}/10)"
              sleep 3
            fi
          done

          exit 1
